name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secrets:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Invoked directly (same command as the pre-push hook) instead of gitleaks-action:
      # the action derives a `first^..last` range from the push payload, which is an
      # invalid revision when the push includes the root commit.
      - name: Scan full history with gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks git --redact -v .

  frontend:
    name: Frontend (eslint, tsc, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run build

  backend:
    name: Backend (spotless, checkstyle, tests, cpd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -B verify
